version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  agents:
    build:
      context: ./agents_api
      dockerfile: Dockerfile
    container_name: regulatory-agents
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - AWS_REGION=${AWS_REGION:-us-east-1}
      # Optional: set in project .env (never commit real values). boto3 uses these for Bedrock when AGENTS_STUB_LLM=0.
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_SESSION_TOKEN=${AWS_SESSION_TOKEN:-}
      - AGENTS_STUB_LLM=${AGENTS_STUB_LLM:-1}
      - BEDROCK_CHAT_MODEL_ID=${BEDROCK_CHAT_MODEL_ID:-amazon.nova-pro-v1:0}

  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - N8N_COMMUNITY_PACKAGES_ALLOW_TOOL_USAGE=true
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=true
      - N8N_FORWARD_HEADERS=true
      # - NODE_FUNCTION_ALLOW_BUILTIN=crypto
      # - NODE_FUNCTION_ALLOW_BUILTIN=https
      # Optional: To allow all built-in modules
      - NODE_FUNCTION_ALLOW_BUILTIN=* 
      # Set in project-root .env (see .env.example). Required for Bedrock signing in the workflow.
      - N8N_AWS_ACCESS_KEY_ID=${N8N_AWS_ACCESS_KEY_ID}
      - N8N_AWS_SECRET_ACCESS_KEY=${N8N_AWS_SECRET_ACCESS_KEY}
      # Optional: only for temporary STS/SSO/assumed-role credentials
      - N8N_AWS_SESSION_TOKEN=${N8N_AWS_SESSION_TOKEN}
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=false
      # Optional: Add an encryption key for your credentials
      # - N8N_ENCRYPTION_KEY=your_secret_key_here
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      - qdrant
      - agents

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: regulatory-web
    restart: unless-stopped
    ports:
      - "8787:8787"
    # Merge local `web/.env` (login, dev defaults). `environment` below overrides per key for Docker (Qdrant URL, agents, port).
    env_file:
      - ./web/.env
    environment:
      - NODE_ENV=production
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_API_KEY=${QDRANT_API_KEY:-}
      - RUNS_COLLECTION=${RUNS_COLLECTION:-regulatory_docs_runs}
      - CHUNKS_COLLECTION=${CHUNKS_COLLECTION:-regulatory_docs}
      - WEB_PORT=8787
      - AGENTS_URL=http://agents:8000
    depends_on:
      - qdrant
      - agents

volumes:
  n8n_data:
  qdrant_data:
